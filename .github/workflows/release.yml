name: Release image

# Build + push the container image to GHCR when a version tag is pushed.
# This is the app repo's ONLY deployment responsibility — actually deploying
# is a one-line pinned-tag bump in the home-server repo's
# compose/dokploy-apps/price-tracker/docker-compose.yml (GitOps split:
# app repo = build, platform repo = deployment truth).
#
# Release flow:
#   git tag v0.1.0 && git push origin v0.1.0
#   -> image ghcr.io/magter/price-tracker:v0.1.0 (+ :sha-<commit>)

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/magter/price-tracker
          tags: |
            type=semver,pattern=v{{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          # The home server is amd64 — build for it explicitly so a future
          # ARM runner change can't silently produce an unrunnable image.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
